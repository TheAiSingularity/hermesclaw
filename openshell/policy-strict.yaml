# ─────────────────────────────────────────────────────────────────────────────
# HermesClaw — STRICT Policy (inference only, most secure)
# ─────────────────────────────────────────────────────────────────────────────
# STRICT = inference only. The hermes binary may reach ONLY the OpenShell
# in-cluster inference router at `inference.local`. No messaging gateways,
# no web access, no third-party APIs, no package registries.
#
# Use this policy when:
#   - Running untrusted prompts or autonomous agent loops.
#   - You want a provable "no data exfiltration" posture.
#   - You don't need Telegram/Discord/Slack notifications.
#   - You're shipping HermesClaw to an air-gapped or compliance-sensitive env.
#
# This is the most secure tier. If hermes needs messaging, use policy-gateway.
# If it needs web/GitHub/HuggingFace, use policy-permissive.
#
# WARNING: Schema matches NVIDIA/NemoClaw v0.1.0 reference blueprint. Do not
# change field names without verifying against
# `~/.nemoclaw/source/nemoclaw-blueprint/policies/openclaw-sandbox.yaml`.
#
# Apply with:
#   openshell policy set hermesclaw-1 --policy openshell/policy-strict.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge     # user knowledge docs (mounted ro)
    - /sandbox/configs       # persona + hermes config (mounted ro)
  read_write:
    - /opt/hermes-data       # Hermes memories, skills, auth
    - /sandbox               # agent working directory
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # ── OpenShell inference router ─────────────────────────────────────────
  # `inference.local` is the NVIDIA OpenShell in-cluster inference endpoint.
  # Both 443 (TLS) and 80 (plaintext) are allowed because the router may be
  # exposed on either depending on the OpenShell deployment topology.
  inference_local:
    name: inference_local
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: inference.local
        port: 80
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
