# ─────────────────────────────────────────────────────────────────────────────
# HermesClaw — Default Baseline Policy
# ─────────────────────────────────────────────────────────────────────────────
# This is the default policy loaded by HermesClaw when no explicit --policy
# flag is given. It is functionally identical to policy-strict.yaml:
#
#   INFERENCE ONLY — the hermes binary may talk to inference.local only.
#   No messaging gateways, no web access, no GitHub, no HuggingFace.
#
# Use this policy when:
#   - Running HermesClaw for the first time (safe default).
#   - You only need LLM inference and local tools (filesystem, bash, etc).
#   - You want the tightest possible egress surface.
#
# WARNING: Schema matches NVIDIA/NemoClaw v0.1.0 reference blueprint. Do not
# change field names without verifying against
# `~/.nemoclaw/source/nemoclaw-blueprint/policies/openclaw-sandbox.yaml`.
# HermesClaw v0.3.0 shipped an invented schema (access_level, landlock.enabled,
# protocol: https, rest: blocks) that OpenShell rejects. This file uses the
# real schema.
#
# Apply with:
#   openshell policy set hermesclaw-1 --policy openshell/hermesclaw-policy.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge     # user knowledge docs (mounted ro)
    - /sandbox/configs       # persona + hermes config (mounted ro)
  read_write:
    - /opt/hermes-data       # Hermes memories, skills, auth
    - /sandbox               # agent working directory
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # ── OpenShell inference router ─────────────────────────────────────────
  # `inference.local` is the NVIDIA OpenShell in-cluster inference endpoint.
  # Both 443 (TLS) and 80 (plaintext) are allowed because the router may be
  # exposed on either depending on the OpenShell deployment topology.
  inference_local:
    name: inference_local
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: inference.local
        port: 80
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
