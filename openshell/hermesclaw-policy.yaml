# HermesClaw — OpenShell Sandbox Policy
#
# Enforced at the kernel level via:
#   Landlock LSM    — filesystem isolation (locked at sandbox creation)
#   Seccomp BPF     — syscall filtering    (locked at sandbox creation)
#   OPA + HTTP CONNECT proxy — network egress control (hot-reloadable)
#
# Apply to a running sandbox:
#   openshell policy set hermesclaw-1 --policy openshell/hermesclaw-policy.yaml --wait
#
# Create sandbox with this policy:
#   openshell sandbox create --policy openshell/hermesclaw-policy.yaml -- hermes gateway
#
# Reference: https://docs.nvidia.com/openshell/latest/reference/policy-schema.html

version: 1

# ── Filesystem (Landlock LSM — STATIC, locked at creation) ───────────────────
# Changes require destroying and recreating the sandbox.
filesystem_policy:
  include_workdir: true         # Auto-include the agent's working directory (/sandbox)

  read_only:
    - /usr                      # System binaries and libraries
    - /lib                      # Shared libraries
    - /lib64                    # 64-bit shared libraries
    - /bin                      # Core executables
    - /etc/ssl                  # TLS certificates (needed for HTTPS to inference.local)
    - /etc/resolv.conf          # DNS resolution
    - /etc/passwd               # User ID lookup
    - /etc/group                # Group ID lookup
    - /sandbox/knowledge        # User docs (mounted read-only from host)
    - /sandbox/configs          # Persona + hermes config (mounted read-only from host)

  read_write:
    - /root/.hermes             # Hermes memories, skills, config, auth tokens
    - /sandbox                  # Agent working directory (code, output, tasks)
    - /tmp                      # Temporary files

# ── Landlock compatibility ────────────────────────────────────────────────────
landlock:
  # best_effort: sandbox still starts on kernels without Landlock (graceful degradation)
  # hard_requirement: refuse to start if kernel lacks Landlock support
  compatibility: best_effort

# ── Process isolation (STATIC, locked at creation) ────────────────────────────
# Hermes runs as an unprivileged user — cannot escalate to root.
process:
  run_as_user: hermes
  run_as_group: hermes

# ── Network policies (OPA + HTTP CONNECT — HOT-RELOADABLE) ───────────────────
# Named policies. The active policy can be swapped on a running sandbox with:
#   openshell policy set hermesclaw-1 --policy openshell/hermesclaw-policy.yaml --wait
#
# Enforcement modes:
#   enforce  — block requests that violate the policy, log the denial
#   audit    — allow all requests, log violations (useful during onboarding)
#
# Access levels:
#   read-only   — GET, HEAD, OPTIONS only
#   read-write  — GET + POST/PUT/PATCH
#   full        — all HTTP methods
network_policies:

  # ── Inference: allow Hermes to call the LLM ─────────────────────────────────
  # OpenShell intercepts calls to inference.local and routes them to the
  # configured inference endpoint (llama.cpp on the host, or any OpenAI-compatible API).
  # Credentials are stripped from the request and backend credentials are injected.
  inference_local:
    endpoints:
      - host: "inference.local"
        port: 443
        enforcement: enforce
        access: full
        rules:
          - method: "POST"
            path: "/v1/chat/completions"
          - method: "POST"
            path: "/v1/completions"
          - method: "POST"
            path: "/v1/embeddings"
          - method: "GET"
            path: "/v1/models"
      - host: "inference.local"
        port: 80
        enforcement: enforce
        access: full
    binaries:
      - path: "/root/.local/bin/hermes*"
      - path: "/usr/bin/python3*"

  # ── Hermes gateway: allow Telegram API (uncomment to enable) ─────────────────
  # Required for: hermes gateway (Telegram bot)
  # telegram:
  #   endpoints:
  #     - host: "api.telegram.org"
  #       port: 443
  #       enforcement: enforce
  #       access: full
  #   binaries:
  #     - path: "/root/.local/bin/hermes*"

  # ── Hermes gateway: allow Discord API (uncomment to enable) ──────────────────
  # discord:
  #   endpoints:
  #     - host: "discord.com"
  #       port: 443
  #       enforcement: enforce
  #       access: full
  #     - host: "gateway.discord.gg"
  #       port: 443
  #       enforcement: enforce
  #       access: full
  #   binaries:
  #     - path: "/root/.local/bin/hermes*"

  # ── Skills: allow Hermes to download/publish skills (uncomment to enable) ────
  # Required for: hermes skills install, hermes skills search, skill auto-creation
  # github_skills:
  #   endpoints:
  #     - host: "github.com"
  #       port: 443
  #       enforcement: enforce
  #       access: read-write
  #     - host: "raw.githubusercontent.com"
  #       port: 443
  #       enforcement: enforce
  #       access: read-only
  #     - host: "api.github.com"
  #       port: 443
  #       enforcement: enforce
  #       access: read-write
  #   binaries:
  #     - path: "/root/.local/bin/hermes*"

  # ── Web search: allow Hermes web_search tool (uncomment to enable) ────────────
  # Required for: hermes web_search tool, web_extract tool
  # web_search:
  #   endpoints:
  #     - host: "html.duckduckgo.com"
  #       port: 443
  #       enforcement: enforce
  #       access: read-only
  #     - host: "api.duckduckgo.com"
  #       port: 443
  #       enforcement: enforce
  #       access: read-only
  #   binaries:
  #     - path: "/root/.local/bin/hermes*"
