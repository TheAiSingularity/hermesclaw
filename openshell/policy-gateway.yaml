# ─────────────────────────────────────────────────────────────────────────────
# HermesClaw — GATEWAY Policy (inference + Telegram + Discord messaging)
# ─────────────────────────────────────────────────────────────────────────────
# GATEWAY = inference + messaging. Adds Telegram Bot API and Discord
# (REST, gateway, CDN, media) on top of the strict inference-only baseline.
# Designed for agents that act as chat-driven assistants or relay
# notifications to human operators.
#
# Use this policy when:
#   - HermesClaw is running as a Telegram/Discord bot or watcher.
#   - The agent needs to push status updates or accept commands from chat.
#   - You do NOT want general web, GitHub, or HuggingFace access.
#
# Still denies: Slack, web search, GitHub, HuggingFace, npm, pip, anything
# not explicitly listed below.
#
# WARNING: Schema matches NVIDIA/NemoClaw v0.1.0 reference blueprint. Do not
# change field names without verifying against
# `~/.nemoclaw/source/nemoclaw-blueprint/policies/openclaw-sandbox.yaml`.
# Note: the NemoClaw presets bind messaging endpoints to `/usr/local/bin/node`
# because OpenClaw is a Node.js app. Hermes is Python, so we bind to
# `/usr/local/bin/hermes` instead — this is the ONLY intentional divergence
# from the reference preset shape. (Relocated from /root/.local/bin in v0.3.2
# so the OpenShell sandbox user can execute it; see issue #3.)
#
# Apply with:
#   openshell policy set hermesclaw-1 --policy openshell/policy-gateway.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge     # user knowledge docs (mounted ro)
    - /sandbox/configs       # persona + hermes config (mounted ro)
  read_write:
    - /opt/hermes-data       # Hermes memories, skills, auth
    - /sandbox               # agent working directory
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # ── OpenShell inference router ─────────────────────────────────────────
  inference_local:
    name: inference_local
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: inference.local
        port: 80
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }

  # ── Telegram Bot API ───────────────────────────────────────────────────
  # Modeled on nemoclaw-blueprint/policies/presets/telegram.yaml.
  # Binary bound to hermes (Python) instead of node.
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }
    binaries:
      - { path: /usr/local/bin/hermes }

  # ── Discord API + gateway + CDN ────────────────────────────────────────
  # Modeled on nemoclaw-blueprint/policies/presets/discord.yaml.
  # gateway.discord.gg uses access: full (CONNECT tunnel) because the
  # WebSocket gateway needs a long-lived connection that the REST proxy
  # would kill via HTTP idle timeout. See NemoClaw #409.
  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: PATCH, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      - host: gateway.discord.gg
        port: 443
        access: full
      - host: cdn.discordapp.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: media.discordapp.net
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
