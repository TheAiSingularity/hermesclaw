# ─────────────────────────────────────────────────────────────────────────────
# HermesClaw — PERMISSIVE Policy (inference + messaging + web + code hosts)
# ─────────────────────────────────────────────────────────────────────────────
# PERMISSIVE = inference + Telegram + Discord + Slack + HuggingFace + GitHub
# + DuckDuckGo web search. This is the widest egress surface HermesClaw
# ships with by default.
#
# Use this policy when:
#   - You're developing / debugging HermesClaw and need full tooling.
#   - The agent must clone repos, pull HF models, search the web, and
#     message across multiple chat platforms.
#   - You trust the prompts running inside the sandbox.
#
# DO NOT use this for untrusted autonomous loops — any prompt injection
# that convinces the agent to exfiltrate data has many egress paths here.
# For locked-down deployments, use policy-strict.yaml or policy-gateway.yaml.
#
# WARNING: Schema matches NVIDIA/NemoClaw v0.1.0 reference blueprint. Do not
# change field names without verifying against
# `~/.nemoclaw/source/nemoclaw-blueprint/policies/openclaw-sandbox.yaml`.
# Messaging endpoints are bound to `/usr/local/bin/hermes` (Python) instead
# of `/usr/local/bin/node` — this is the only intentional divergence from the
# NemoClaw preset shape. (Relocated from /root/.local/bin in v0.3.2 so the
# OpenShell sandbox user can execute it; see issue #3.)
#
# Apply with:
#   openshell policy set hermesclaw-1 --policy openshell/policy-permissive.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge     # user knowledge docs (mounted ro)
    - /sandbox/configs       # persona + hermes config (mounted ro)
  read_write:
    - /root/.hermes          # Hermes memories, skills, auth
    - /sandbox               # agent working directory
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # ── OpenShell inference router ─────────────────────────────────────────
  inference_local:
    name: inference_local
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: inference.local
        port: 80
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }

  # ── Telegram Bot API ───────────────────────────────────────────────────
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }
    binaries:
      - { path: /usr/local/bin/hermes }

  # ── Discord ────────────────────────────────────────────────────────────
  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: PATCH, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      - host: gateway.discord.gg
        port: 443
        access: full
      - host: cdn.discordapp.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: media.discordapp.net
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }

  # ── Slack ──────────────────────────────────────────────────────────────
  # Modeled on nemoclaw-blueprint/policies/presets/slack.yaml. Task spec
  # only required slack.com:443 but we also include the api/hooks hosts
  # that the NemoClaw preset ships, because slack.com alone is useless
  # without them. Socket Mode WebSocket endpoints use access: full.
  slack:
    name: slack
    endpoints:
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: api.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: hooks.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: wss-primary.slack.com
        port: 443
        access: full
      - host: wss-backup.slack.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/hermes }

  # ── HuggingFace Hub / LFS / Inference ──────────────────────────────────
  # Modeled on nemoclaw-blueprint/policies/presets/huggingface.yaml.
  huggingface:
    name: huggingface
    endpoints:
      - host: huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: cdn-lfs.huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }

  # ── GitHub ─────────────────────────────────────────────────────────────
  # Read/write API + raw content fetch. Binary-bound to hermes so arbitrary
  # curl/wget can't piggyback on this policy.
  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: PATCH, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      - host: raw.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }

  # ── DuckDuckGo web search (GET only) ───────────────────────────────────
  # Read-only web search. No POST — prevents using DDG as an exfil sink.
  web_search:
    name: web_search
    endpoints:
      - host: html.duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: api.duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
