# HermesClaw — PERMISSIVE policy preset
#
# Full capability: inference + all gateways + web search + skills download.
# Hermes can:
#   - Call the local LLM via inference.local
#   - Post/receive Telegram, Discord, Slack, Signal messages
#   - Run web_search and web_extract tools (DuckDuckGo)
#   - Download and publish skills from GitHub
#   - Use MCP servers on localhost
#
# Still blocked:
#   - Arbitrary outbound connections (only approved hosts)
#   - Filesystem outside ~/.hermes and /sandbox
#   - Privileged syscalls
#
# Use when: you want the full Hermes toolset with sandbox safety net.
#
# Apply: openshell policy set hermesclaw-1 --policy openshell/policy-permissive.yaml --wait

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge
    - /sandbox/configs
  read_write:
    - /root/.hermes
    - /sandbox
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: hermes
  run_as_group: hermes

network_policies:
  inference_local:
    endpoints:
      - host: "inference.local"
        port: 443
        enforcement: enforce
        access: full
      - host: "inference.local"
        port: 80
        enforcement: enforce
        access: full
    binaries:
      - path: "/root/.local/bin/hermes*"
      - path: "/usr/bin/python3*"

  telegram_gateway:
    endpoints:
      - host: "api.telegram.org"
        port: 443
        enforcement: enforce
        access: full
    binaries:
      - path: "/root/.local/bin/hermes*"

  discord_gateway:
    endpoints:
      - host: "discord.com"
        port: 443
        enforcement: enforce
        access: full
      - host: "gateway.discord.gg"
        port: 443
        enforcement: enforce
        access: full
    binaries:
      - path: "/root/.local/bin/hermes*"

  slack_gateway:
    endpoints:
      - host: "slack.com"
        port: 443
        enforcement: enforce
        access: full
      - host: "wss-primary.slack.com"
        port: 443
        enforcement: enforce
        access: full
    binaries:
      - path: "/root/.local/bin/hermes*"

  web_search:
    endpoints:
      - host: "html.duckduckgo.com"
        port: 443
        enforcement: enforce
        access: read-only
      - host: "api.duckduckgo.com"
        port: 443
        enforcement: enforce
        access: read-only
    binaries:
      - path: "/root/.local/bin/hermes*"

  github_skills:
    endpoints:
      - host: "github.com"
        port: 443
        enforcement: enforce
        access: read-write
      - host: "raw.githubusercontent.com"
        port: 443
        enforcement: enforce
        access: read-only
      - host: "api.github.com"
        port: 443
        enforcement: enforce
        access: read-write
    binaries:
      - path: "/root/.local/bin/hermes*"
